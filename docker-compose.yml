services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      target: backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/hopit
      CLIENT_URL: http://localhost:8080
    depends_on:
      mongo:
        condition: service_healthy
    expose: ["5000"]
    volumes:
      - uploads_data:/app/backend/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      target: frontend
      args:
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
  uploads_data:
